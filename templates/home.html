<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DataGPT Home</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: url("{{ url_for('static', filename='images/bg_hackthon.png') }}") no-repeat center center/cover;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.4);
            height: 100vh;
        }

        .content {
            height: 100%;
            display: flex;
            align-items: center;
        }

        .title {
            font-size: 65px;
            font-weight: bold;
        }

        .btn-custom {
            border-radius: 25px;
            padding: 12px 30px;
        }

        .btn-login {
            border: 2px solid #ff00cc;
            color: #ff00cc;
        }

        .btn-login:hover {
            background: #ff00cc;
            color: white;
        }

        .btn-signup {
            background: linear-gradient(45deg, #ff00cc, #3333ff);
            border: none;
            color: white;
        }
    </style>
</head>

<body>

<div class="overlay">

    <nav class="navbar navbar-dark px-5">
        <span class="navbar-brand">DataGPT</span>
        <div>
            <a href="{{ url_for('home') }}" class="text-white me-4">HOME</a>
            <a href="/blog" class="text-white me-4">BLOG</a>
            <a href="/contact" class="text-white">CONTACTS</a>
        </div>
    </nav>

    <div class="container content">
        <div class="col-md-6">
            <div class="title">DataGPT</div>

            <p class="mt-3">
                Generate smart datasets using AI. Create and download data instantly.
            </p>

            <div class="mt-4">
                <a href="/login" class="btn btn-login btn-custom me-3">Login</a>
                <a href="/signup" class="btn btn-signup btn-custom">Sign Up</a>
            </div>
        </div>
    </div>

</div>

</body>
</html>
